name: Django CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bloodmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/bloodmatch
          DJANGO_SETTINGS_MODULE: bloodmatch.settings_production
          DATABASE_SSL: False
          SECRET_KEY: github-actions-test-key
          DEBUG: False
        run: python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/bloodmatch
          DJANGO_SETTINGS_MODULE: bloodmatch.settings_production
          DATABASE_SSL: False
          SECRET_KEY: github-actions-test-key
          DEBUG: False
        run: python manage.py test
